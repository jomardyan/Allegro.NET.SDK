name: Build and Test (Multi-OS)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'tests/**'
      - '*.sln'
      - '.github/workflows/build-test.yml'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: 'Release'

permissions:
  checks: write
  contents: read
  actions: read
  pull-requests: write

jobs:
  build-and-test:
    name: Build and Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Display .NET info
      run: dotnet --info
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore
    
    - name: Run tests
      run: dotnet test --configuration ${{ env.CONFIGURATION }} --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"
    
    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always() && runner.os == 'Linux'
      with:
        files: '**/test-results.trx'
    
    - name: Code coverage
      if: matrix.os == 'ubuntu-latest'
      run: |
        dotnet test --configuration ${{ env.CONFIGURATION }} --no-build \
          --collect:"XPlat Code Coverage" \
          --results-directory ./coverage
    
    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest'
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage/**/coverage.cobertura.xml
        flags: unittests
        name: codecov-allegroapi

  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build for analysis
      run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore
    
    - name: Run security scan
      run: |
        dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerabilities.txt
        if grep -q "has the following vulnerable packages" vulnerabilities.txt; then
          echo "❌ Vulnerable packages found!"
          cat vulnerabilities.txt
          exit 1
        else
          echo "✅ No vulnerable packages found"
        fi

  pack-validation:
    name: Validate NuGet Package
    runs-on: ubuntu-latest
    needs: build-and-test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          6.0.x
          ${{ env.DOTNET_VERSION }}
    
    - name: Restore and build
      run: |
        dotnet restore
        dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore
    
    - name: Pack
      run: dotnet pack src/AllegroApi/AllegroApi.csproj --configuration ${{ env.CONFIGURATION }} --no-build --output ./nupkg
    
    - name: Validate package
      run: |
        echo "📦 Package contents:"
        ls -lh ./nupkg/
        
        # Install validation tool
        dotnet tool install --global dotnet-validate --version 0.0.1-preview.304
        
        # Validate package
        for pkg in ./nupkg/*.nupkg; do
          echo "Validating $pkg..."
          dotnet validate package local "$pkg"
        done
    
    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package-preview
        path: ./nupkg/*.nupkg
        retention-days: 7
